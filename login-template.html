<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Alcance Empresarial | Panorama Clientes Agro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:
    linear-gradient(
    rgba(10,10,10,.88),
    rgba(10,10,10,.92)
    ),
    url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=1800");

    background-size:cover;
    background-position:center;

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:420px;
    padding:45px;
    border-radius:28px;

    background:rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.10);

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    text-align:center;
}

.logo{
    width:140px;
    margin-bottom:20px;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    color:#bdbdbd;
    margin-bottom:35px;
    line-height:1.6;
}

input{
    width:100%;
    padding:18px;
    border-radius:16px;
    border:none;

    background:#1e1e1e;
    color:white;

    font-size:16px;
    outline:none;

    margin-bottom:20px;
}

button{
    width:100%;
    border:none;
    border-radius:16px;

    padding:18px;

    font-size:16px;
    cursor:pointer;

    transition:.3s ease;
}

button:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:22px;
    color:#8b8b8b;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <img
      src="assets/logo_alcance.png"
      class="logo"
      alt="Alcance Logo"
    />

    <h1>Panorama de Empresas</h1>

    <p class="subtitle">
        Acesso seguro aos indicadores financeiros.<br>
        Digite sua senha para continuar.
    </p>

    <form id="password-form">
        <input
            id="password"
            type="password"
            placeholder="Digite sua senha"
        />

        <button type="submit">
            Entrar no Dashboard
        </button>
    </form>

    <div class="footer">
        RSP • Inteligência Financeira
    </div>

</div>

<!-- STATICRYPT_PASSWORD_PLACEHOLDER -->

</body>
</html>
