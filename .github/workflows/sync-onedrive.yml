name: Sync OneDrive → GitHub Pages

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Baixar arquivo do OneDrive
        run: |
          mkdir -p data

          # Tenta 3 formatos de URL em sequência até um funcionar
          URLS=(
            "https://onedrive.live.com/personal/05418175b9d0adeb/_layouts/15/download.aspx?UniqueId=f21956fd-e3a9-4b19-baac-1de30753d3da&authkey=%21A5SI70c"
            "https://1drv.ms/x/c/05418175b9d0adeb/IQD9VhnyqeMZS7qsHeMHU9PaASlYVOTF7jHWP85FYLUn01Q?e=5SI70c&download=1"
            "https://api.onedrive.com/v1.0/shares/u!aHR0cHM6Ly8xZHJ2Lm1zL3gvYy8wNTQxODE3NWI5ZDBhZGViL0lRRDlWaG55cWVNWlM3cXNIZU1IVTlQYUFTbFlWT1RGN2pIV1A4NUZZTFVuMDFRP2U9NVNJNzBj/root/content"
          )

          SUCCESS=false
          for URL in "${URLS[@]}"; do
            echo "Tentando: $URL"
            curl -L --silent --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              -o data/Panorama_empresas.xlsx \
              "$URL"

            # Verifica se é um ZIP/XLSX válido (começa com PK)
            MAGIC=$(xxd -l 2 data/Panorama_empresas.xlsx 2>/dev/null | head -1)
            if echo "$MAGIC" | grep -q "504b"; then
              echo "✅ Download OK com: $URL"
              echo "Tamanho: $(wc -c < data/Panorama_empresas.xlsx) bytes"
              SUCCESS=true
              break
            else
              echo "❌ Não é XLSX. Resposta recebida:"
              head -c 300 data/Panorama_empresas.xlsx
              echo ""
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Todas as URLs falharam. O link do OneDrive pode ter expirado."
            exit 1
          fi

      - name: Commit e push (se houver mudança)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/Panorama_empresas.xlsx
          if git diff --staged --quiet; then
            echo "ℹ️ Arquivo sem alterações — nenhum commit necessário"
          else
            git commit -m "chore: atualiza Panorama_empresas.xlsx [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
