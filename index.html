<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Panorama Agro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        rgba(10,10,10,.88),
        rgba(10,10,10,.92)
    ),
    url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=1800");

    background-size:cover;
    background-position:center;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

.container{
    width:420px;
    max-width:90vw;

    padding:45px;
    border-radius:28px;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.10);

    box-shadow:
        0 20px 60px rgba(0,0,0,.45);

    text-align:center;
}

.logo{
    width:140px;
    margin-bottom:20px;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    color:#c9c9c9;
    line-height:1.6;
    margin-bottom:28px;
}

input{
    width:100%;
    padding:18px;

    border:none;
    border-radius:16px;

    background:#171717;
    color:white;

    outline:none;
    font-size:16px;

    margin-bottom:18px;
}

button{
    width:100%;

    padding:18px;

    border:none;
    border-radius:16px;

    cursor:pointer;

    font-size:16px;
    font-weight:600;

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.error{
    color:#ff8a8a;
    margin-top:14px;
    display:none;
}

.footer{
    margin-top:22px;
    color:#9f9f9f;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <img
        src="assets/logo_alcance.png"
        class="logo"
        alt="Logo"
    >

    <h1>Panorama de Empresas</h1>

    <p class="subtitle">
        Acesso seguro aos indicadores financeiros.<br>
        Digite sua senha para continuar.
    </p>

    <input
        type="password"
        id="senha"
        placeholder="Digite sua senha"
    >

    <button onclick="entrar()">
        Entrar na Página
    </button>

    <div class="error" id="erro">
        Senha incorreta
    </div>

    <div class="footer">
        RSP • Inteligência Financeira
    </div>

</div>

<script>
function entrar(){

    const senha = document
        .getElementById("senha")
        .value;

    if(senha === "alcance@2026"){

        sessionStorage.setItem(
            "dashboardAuth",
            "true"
        );

        window.location.href = "dashboard.html";
    }
    else{
        document
            .getElementById("erro")
            .style.display = "block";
    }
}
</script>

</body>
</html>
